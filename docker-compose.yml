services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xeno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: xeno-local
    ports:
      - "5432:5432"
    volumes:
      - xeno-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xeno"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - xeno-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  crm:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:xeno-local@postgres:5432/xeno?schema=public
      REDIS_URL: redis://redis:6379
      CHANNEL_SERVICE_URL: http://channel-service:4000
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
      - "3001:3001"
    command: ["sh", "-c", "node apps/crm/ws-dist/ws-server.js & node node_modules/prisma/build/index.js migrate deploy --schema=apps/crm/prisma/schema.prisma && node apps/crm/server.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  channel-service:
    build:
      context: .
      dockerfile: apps/channel-service/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      CRM_RECEIPT_URL: http://crm:3000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  xeno-postgres:
  xeno-redis:
