services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_DB}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - xeno-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_POSTGRES_USER} -d ${DOCKER_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - xeno-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  crm:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      REDIS_URL: ${DOCKER_REDIS_URL}
      CHANNEL_SERVICE_URL: ${DOCKER_CHANNEL_SERVICE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    ports:
      - "3000:3000"
      - "3001:3001"
    command: ["sh", "-c", "node apps/crm/ws-dist/ws-server.js & node node_modules/prisma/build/index.js migrate deploy --schema=apps/crm/prisma/schema.prisma && node apps/crm/server.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  channel-service:
    build:
      context: .
      dockerfile: apps/channel-service/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: ${DOCKER_REDIS_URL}
      CRM_RECEIPT_URL: ${DOCKER_CRM_RECEIPT_URL}
      PORT: ${PORT}
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  xeno-postgres:
  xeno-redis:
