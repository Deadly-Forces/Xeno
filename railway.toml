# Railway deployment config — CRM service (Next.js)
# This root-level file is used by Railway for automatic deploys.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/crm/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 20
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
