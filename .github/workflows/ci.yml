name: CI
on: [push, pull_request]
env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xeno?schema=public
  REDIS_URL: redis://localhost:6379
  CHANNEL_SERVICE_URL: http://localhost:4000
  CRM_RECEIPT_URL: http://localhost:3000
  RECEIPT_HMAC_SECRET: ci-receipt-secret-at-least-32-characters
  COMMERCE_HMAC_SECRET: ci-commerce-secret-at-least-32-characters
  NEXTAUTH_SECRET: ci-nextauth-secret-at-least-32-characters
  NEXTAUTH_URL: http://localhost:3000
  MARKETER_EMAIL: marketer@example.com
  MARKETER_PASSWORD_SHA256: 5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8
  DEMO_PASSWORD: password
  E2E_PASSWORD: password
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: xeno, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U postgres -d xeno" --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx prisma migrate deploy --schema apps/crm/prisma/schema.prisma
      - run: npm run seed
        env: { NODE_ENV: development }
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: cp .env.example .env
      - run: docker compose config
      - run: docker build -f apps/crm/Dockerfile -t xeno-crm .
      - run: docker build -f apps/channel-service/Dockerfile -t xeno-channel .

  browser:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: xeno, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npx prisma migrate deploy --schema apps/crm/prisma/schema.prisma
      - run: npm run seed
      - run: npm run dev > dev.log 2>&1 &
      - run: for i in {1..60}; do curl -fsS http://localhost:3000/api/health && curl -fsS http://localhost:4000/health && exit 0; sleep 2; done; exit 1
      - run: npm run e2e
      - run: npm run load-test
