# Railway deployment config — CRM service (Next.js)
# Duplicate of root railway.toml for reference. Railway uses the root file.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/crm/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 20
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
